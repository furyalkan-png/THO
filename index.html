<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THO Esports</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#001f4d,#700000);
color:white;
}

nav{
position:fixed;
top:0;
width:100%;
padding:20px;
background:rgba(0,0,0,.4);
backdrop-filter:blur(10px);
display:flex;
justify-content:center;
gap:40px;
z-index:1000;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
}

header{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

header h1{
font-size:90px;
text-shadow:0 0 20px #00aaff;
}

header p{
font-size:24px;
margin-top:15px;
}

section{
padding:100px 10%;
}

.title{
text-align:center;
font-size:50px;
margin-bottom:50px;
}

.players{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:rgba(255,255,255,.08);
border-radius:20px;
padding:25px;
text-align:center;
transition:.3s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 25px #00aaff;
}

.card h2{
margin-bottom:10px;
}

.role{
color:#00aaff;
font-weight:bold;
}

.country{
margin-top:10px;
font-size:18px;
}

footer{
padding:30px;
text-align:center;
background:black;
}
</style>
</head>

<body>

<nav>
<a href="#home">Home</a>
<a href="#roster">Roster</a>
<a href="#subs">Substitutes</a>
</nav>

<header id="home">
<h1>THO ESPORTS</h1>
<p>Brawl Stars Competitive Team</p>
</header>

<section id="roster">
<h1 class="title">MAIN ROSTER</h1>

<div class="players">

<div class="card">
<h2>🇮🇹 ALFA</h2>
<p class="role">Player</p>
</div>

<div class="card">
<h2>🇹🇷 FRAT</h2>
<p class="role">Player</p>
</div>

<div class="card">
<h2>🇩🇪 FABI</h2>
<p class="role">Player</p>
</div>

</div>
</section>

<section id="subs">
<h1 class="title">SUBSTITUTES</h1>

<div class="players">

<div class="card">
<h2>🇪🇸 DESTRO</h2>
<p class="role">Substitute</p>
</div>

<div class="card">
<h2>🇮🇹 AGENTEKIT KEVIN</h2>
<p class="role">Substitute</p>
</div>

</div>
</section>

<footer>
<h2>THO Esports © 2026</h2>
</footer>

</body>
</html>
