<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THO Esports</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(90deg,#001a44,#4d0000);
color:white;
}

header{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

header h1{
font-size:80px;
text-shadow:0 0 20px #00aaff;
}

header p{
font-size:24px;
margin-top:10px;
}

.btn{
margin-top:25px;
padding:15px 35px;
background:#0099ff;
border:none;
border-radius:10px;
color:white;
font-size:18px;
cursor:pointer;
}

section{
padding:80px 10%;
}

.section-title{
text-align:center;
font-size:50px;
margin-bottom:50px;
}

.roster{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.player{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(8px);
border-radius:20px;
padding:20px;
text-align:center;
transition:0.3s;
}

.player:hover{
transform:translateY(-10px);
box-shadow:0 0 25px #00aaff;
}

.player img{
width:100%;
border-radius:15px;
}

.player h2{
margin-top:15px;
}

.player p{
color:#cccccc;
}

.stats{
display:flex;
justify-content:center;
gap:50px;
flex-wrap:wrap;
}

.stat{
text-align:center;
}

.stat h3{
font-size:50px;
color:#00aaff;
}

footer{
padding:30px;
text-align:center;
background:black;
margin-top:50px;
}
</style>
</head>

<body>

<header>
<h1>THO ESPORTS</h1>
<p>Official Brawl Stars Roster</p>
<button class="btn" onclick="document.getElementById('roster').scrollIntoView()">
View Roster
</button>
</header>

<section id="roster">
<h1 class="section-title">ROSTER</h1>

<div class="roster">

<div class="player">
<img src="https://cdn.brawlify.com/brawlers/byron.png">
<h2>ALFA</h2>
<p>Captain</p>
</div>

<div class="player">
<img src="https://cdn.brawlify.com/brawlers/belle.png">
<h2>FRAT</h2>
<p>Pro Player</p>
</div>

<div class="player">
<img src="https://cdn.brawlify.com/brawlers/carl.png">
<h2>FABI</h2>
<p>Pro Player</p>
</div>

<div class="player">
<img src="https://cdn.brawlify.com/brawlers/mortis.png">
<h2>DESTRO</h2>
<p>Pro Player</p>
</div>

</div>
</section>

<section>
<h1 class="section-title">TEAM STATS</h1>

<div class="stats">
<div class="stat">
<h3>4</h3>
<p>Players</p>
</div>

<div class="stat">
<h3>100%</h3>
<p>Motivation</p>
</div>

<div class="stat">
<h3>∞</h3>
<p>Goals</p>
</div>
</div>
</section>

<footer>
<h2>THO Esports © 2026</h2>
<p>Brawl Stars Competitive Team</p>
</footer>

</body>
</html>
