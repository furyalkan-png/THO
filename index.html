<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THO Esports</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
}

/* HERO */
.hero{
height:100vh;
background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.9)),
url("Roster.png");
background-size:cover;
background-position:center;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:90px;
color:white;
text-shadow:0 0 20px #00aaff;
}

/* PLAYERS */
section{
padding:80px 10%;
}

.title{
text-align:center;
font-size:50px;
margin-bottom:40px;
}

.players{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.card{
background:rgba(255,255,255,.08);
padding:20px;
border-radius:15px;
text-align:center;
cursor:pointer;
transition:.3s;
border:1px solid rgba(255,255,255,.1);
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 20px #00aaff;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
justify-content:center;
align-items:center;
}

.modal-content{
background:#111;
padding:30px;
border-radius:15px;
width:300px;
text-align:center;
position:relative;
border:1px solid #00aaff;
}

.close{
position:absolute;
top:10px;
right:15px;
cursor:pointer;
font-size:20px;
}

</style>
</head>

<body>

<div class="hero">
<h1>THO ESPORTS</h1>
<p>Brawl Stars Team</p>
</div>

<section>
<h1 class="title">ROSTER</h1>

<div class="players">

<div class="card" onclick="openModal('ALFA','🇮🇹 Italy','Main Player')">
ALFA
</div>

<div class="card" onclick="openModal('FRAT','🇹🇷 Türkiye','Main Player')">
FRAT
</div>

<div class="card" onclick="openModal('FABI','🇩🇪 Germany','Main Player')">
FABI
</div>

<div class="card" onclick="openModal('DESTRO','🇪🇸 Spain','Substitute')">
DESTRO
</div>

<div class="card" onclick="openModal('AGENTEKIT KEVIN','🇮🇹 Italy','Substitute')">
KEVIN
</div>

</div>
</section>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<span class="close" onclick="closeModal()">✖</span>

<h2 id="name"></h2>
<p id="country"></p>
<p id="role"></p>

</div>
</div>

<script>
function openModal(name,country,role){
document.getElementById("modal").style.display="flex";
document.getElementById("name").innerText=name;
document.getElementById("country").innerText=country;
document.getElementById("role").innerText=role;
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

window.onclick=function(e){
if(e.target==document.getElementById("modal")){
closeModal();
}
}
</script>

</body>
</html>
