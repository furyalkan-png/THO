<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THO Esports | Official Brawl Stars Roster</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: #1f2833;
            --text-main: #ffffff;
            --tho-blue: #0055ff;
            --tho-red: #ff1100;
            --brawl-gold: #fcc419;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            background-image: radial-gradient(circle at 20% 30%, rgba(0, 85, 255, 0.15) 0%, transparent 40%),
                              radial-gradient(circle at 80% 70%, rgba(255, 17, 0, 0.15) 0%, transparent 40%);
        }

        /* Header / Üst Menü */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: rgba(11, 12, 16, 0.95);
            border-bottom: 3px solid var(--brawl-gold);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-area h1 {
            font-weight: 900;
            font-size: 28px;
            letter-spacing: 2px;
            background: linear-gradient(45deg, var(--tho-blue), var(--tho-red));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 25px;
        }

        .nav-links a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 14px;
        }

        .nav-links a:hover {
            color: var(--brawl-gold);
        }

        /* Hero / Roster Banner Alanı */
        .hero {
            text-align: center;
            padding: 60px 20px;
        }

        .hero h2 {
            font-size: 42px;
            font-weight: 900;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .hero p {
            color: #888;
            font-size: 18px;
            margin-bottom: 30px;
        }

        .roster-banner-container {
            max-width: 1000px;
            margin: 0 auto;
            border: 4px solid var(--brawl-gold);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
        }

        .roster-banner-container img {
            width: 100%;
            display: block;
        }

        /* Düzen ve Başlıklar */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .section-title {
            text-align: center;
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 80px;
            height: 4px;
            background: var(--brawl-gold);
            margin: 10px auto 0 auto;
            border-radius: 2px;
        }

        /* Kartların Yan Yana Dizilimi */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            justify-content: center;
            margin-bottom: 40px;
        }

        /* Oyuncu Kartı Tasarımı */
        .player-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid #2f3b4c;
            transition: all 0.3s ease;
            text-align: center;
            cursor: pointer;
        }

        .player-card:hover {
            transform: translateY(-10px);
            border-color: var(--brawl-gold);
            box-shadow: 0 10px 25px rgba(252, 196, 25, 0.3);
        }

        .player-img-container {
            background: linear-gradient(135deg, #151b24 0%, #0b0c10 100%);
            padding: 30px 20px;
            height: 240px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .player-card img {
            max-height: 100%;
            max-width: 100%;
            object-fit: contain;
        }

        .role-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--brawl-gold);
            color: #000;
            padding: 5px 12px;
            font-size: 11px;
            font-weight: 900;
            border-radius: 20px;
            text-transform: uppercase;
        }

        .sub-badge {
            background: #718096;
            color: #fff;
        }

        .player-info {
            padding: 25px 20px;
        }

        .player-name {
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .player-country {
            font-size: 14px;
            color: #a0aec0;
            font-weight: 700;
        }

        .click-hint {
            font-size: 11px;
            color: var(--brawl-gold);
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* POPUP (MODAL) PENCERESİ */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal.show {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: #151b24;
            border: 3px solid var(--brawl-gold);
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            transform: scale(0.7);
            transition: transform 0.3s ease;
        }

        .modal.show .modal-content {
            transform: scale(1);
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            color: #fff;
            font-size: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .close-btn:hover {
            color: var(--tho-red);
        }

        .modal-img-container {
            background: #0b0c10;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #2f3b4c;
        }

        .modal-img-container img {
            max-height: 200px;
            object-fit: contain;
        }

        .modal-name {
            font-size: 32px;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 10px;
            color: var(--text-main);
        }

        .modal-details {
            font-size: 16px;
            color: #a0aec0;
            line-height: 1.8;
            background: #1f2833;
            padding: 15px;
            border-radius: 8px;
            text-align: left;
        }

        .modal-details strong {
            color: var(--brawl-gold);
        }

        /* Footer */
        footer {
            background: #060709;
            text-align: center;
            padding: 40px 20px;
            border-top: 2px solid #1f2833;
            color: #666;
            font-size: 13px;
        }

        .supercell-disclaimer {
            font-size: 11px;
            margin-top: 15px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
        }
    </style>
</head>

            <li><a href="#substitutes">Substitutes</a></li>
        </ul>
    </header>

        <div class="roster-banner-container">
            <img src="images/roster.png" alt="THO Brawl Stars Roster">
        </div>
    </section>
